version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - misspell
  settings:
    errcheck:
      check-blank: true
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
