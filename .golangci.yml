version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - misspell

formatters:
  enable:
    - gofmt

linters-settings:
  errcheck:
    check-blank: true
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
