name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
      - run: go test ./... -race -count=1

  build:
    needs: test
    strategy:
      matrix:
        goos: [darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build all servers
        run: |
          for server in autotask-mcp itglue-mcp datto-rmm-mcp rocketcyber-mcp datto-uc-mcp datto-network-mcp myitprocess-mcp datto-backup-mcp datto-edr-mcp; do
            ext=""
            [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w" \
              -o dist/${server}-${{ matrix.goos }}-${{ matrix.goarch }}${ext} \
              ./cmd/${server}
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
