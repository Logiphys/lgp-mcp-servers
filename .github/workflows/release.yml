name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build all platforms
        run: make build-all
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
